{% extends 'base.html' %}

{% block title %}Dashboard - Student Portal{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1><i class="bi bi-graph-up me-2"></i>Admin Analytics Dashboard</h1>
    </div>
</div>

<!-- Stats Cards Row -->
<div class="row mb-5">
    <div class="col-md-6">
        <div class="stat-card">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <p class="mb-0">Total Students</p>
                    <h3>{{ total_students }}</h3>
                </div>
                <div style="font-size: 3rem; color: rgba(14, 165, 233, 0.2);">
                    <i class="bi bi-people-fill"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="stat-card">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <p class="mb-0">Average CGPA</p>
                    <h3>{{ avg_cgpa }}</h3>
                </div>
                <div style="font-size: 3rem; color: rgba(16, 185, 129, 0.2);">
                    <i class="bi bi-graph-up"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Charts Row -->
<div class="row">
    <div class="col-lg-6 mb-4">
        <div class="card shadow">
            <div class="card-header d-flex align-items-center">
                <i class="bi bi-pie-chart me-2" style="font-size: 1.2rem;"></i>
                <h5 class="mb-0">Department Distribution</h5>
            </div>
            <div class="card-body">
                <canvas id="deptChart" style="max-height: 300px;"></canvas>
            </div>
        </div>
    </div>

    <div class="col-lg-6 mb-4">
        <div class="card shadow">
            <div class="card-header d-flex align-items-center">
                <i class="bi bi-bar-chart me-2" style="font-size: 1.2rem;"></i>
                <h5 class="mb-0">Average CGPA by Department</h5>
            </div>
            <div class="card-body">
                <canvas id="perfChart" style="max-height: 300px;"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const labels = {{ labels|safe }};
    const counts = {{ counts|safe }};
    const perfAvgs = {{ perf_avgs|safe }};

    // Department Distribution (Doughnut Chart)
    const deptCtx = document.getElementById('deptChart').getContext('2d');
    new Chart(deptCtx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: counts,
                backgroundColor: [
                    'rgba(14, 165, 233, 0.8)',
                    'rgba(16, 185, 129, 0.8)',
                    'rgba(6, 182, 212, 0.8)',
                    'rgba(245, 158, 11, 0.8)',
                    'rgba(239, 68, 68, 0.8)'
                ],
                borderColor: [
                    'rgb(14, 165, 233)',
                    'rgb(16, 185, 129)',
                    'rgb(6, 182, 212)',
                    'rgb(245, 158, 11)',
                    'rgb(239, 68, 68)'
                ],
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        font: { size: 13, weight: '600' },
                        color: '#64748b',
                        padding: 15,
                        usePointStyle: true
                    }
                }
            }
        }
    });

    // Performance Bar Chart
    const perfCtx = document.getElementById('perfChart').getContext('2d');
    new Chart(perfCtx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Average CGPA',
                data: perfAvgs,
                backgroundColor: 'rgba(16, 185, 129, 0.8)',
                borderColor: 'rgb(16, 185, 129)',
                borderWidth: 2,
                borderRadius: 5,
                hoverBackgroundColor: 'rgba(16, 185, 129, 1)'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 4,
                    ticks: {
                        font: { size: 12 },
                        color: '#64748b'
                    },
                    grid: {
                        color: 'rgba(226, 232, 240, 0.5)',
                        drawBorder: false
                    }
                },
                x: {
                    ticks: {
                        font: { size: 12, weight: '600' },
                        color: '#64748b'
                    },
                    grid: { display: false }
                }
            },
            plugins: {
                legend: {
                    labels: {
                        font: { size: 13, weight: '600' },
                        color: '#64748b',
                        padding: 15
                    }
                }
            }
        }
    });
</script>

{% endblock %}
